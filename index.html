<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Imágenes IA</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: var(--dark); font-size: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #1d4ed8; }
        #result-container {
            margin-top: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            overflow: hidden;
        }
        img {
            max-width: 100%;
            height: auto;
            display: none;
        }
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Generador de Imágenes</h1>
    <p>Escribe qué quieres ver (en inglés funciona mejor):</p>
    
    <input type="text" id="userPrompt" placeholder="Ej: A futuristic hospital in the jungle...">
    <button onclick="generateImage()">Generar Imagen</button>

    <div id="result-container">
        <div class="loader" id="loader"></div>
        <img id="generatedImg" src="" alt="Imagen generada">
    </div>
</div>

<script>
    function generateImage() {
        const prompt = document.getElementById('userPrompt').value;
        const imgElement = document.getElementById('generatedImg');
        const loader = document.getElementById('loader');

        if (!prompt) {
            alert("Por favor, escribe algo.");
            return;
        }

        // Mostrar cargador y ocultar imagen anterior
        loader.style.display = "block";
        imgElement.style.display = "none";

        // Usamos la API de Pollinations.ai (IA Generativa gratuita)
        const encodedPrompt = encodeURIComponent(prompt);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&seed=${Math.floor(Math.random() * 1000)}`;

        // Cargamos la imagen
        imgElement.src = imageUrl;

        imgElement.onload = function() {
            loader.style.display = "none";
            imgElement.style.display = "block";
        };
    }
</script>

</body>
</html>
